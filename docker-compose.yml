services:
  compasso:
    image: ghcr.io/s3rgiosan/compasso:latest
    ports:
      - "${PORT:-5181}:5181"
    environment:
      - PORT=5181
      - HOST=0.0.0.0
      - DATABASE_PATH=/data
      - NODE_ENV=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - SECURE_COOKIES=${SECURE_COOKIES:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - DEMO_MODE=${DEMO_MODE:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5181/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
